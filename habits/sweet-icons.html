<!doctype html>
<html lang="uk">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Sweet icons preview — Habits</title>
        <style>
            body {
                font-family:
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    "Helvetica Neue",
                    Arial;
                padding: 24px;
                color: #111;
                background: #f4f6f8;
            }
            h1 {
                font-size: 18px;
                margin: 0 0 12px;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 12px;
                margin-top: 12px;
            }
            .card {
                background: #fff;
                border: 1px solid #eee;
                padding: 12px;
                border-radius: 8px;
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
            }
            .icon {
                width: 40px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .label {
                margin-top: 8px;
                font-size: 13px;
                color: #333;
                text-transform: none;
            }
            .actions {
                margin-top: 10px;
                display: flex;
                gap: 8px;
            }
            button {
                font-size: 12px;
                padding: 6px 8px;
                border-radius: 6px;
                border: 1px solid #ccc;
                background: #fafafa;
                cursor: pointer;
            }
            button.secondary {
                background: #fff;
            }
            pre {
                margin: 8px 0 0;
                background: #f7f7f7;
                border-radius: 6px;
                padding: 8px;
                font-size: 12px;
                overflow: auto;
                max-height: 120px;
            }
            .hint {
                margin-top: 8px;
                font-size: 13px;
                color: #555;
            }
            code {
                background: #eee;
                padding: 2px 4px;
                border-radius: 4px;
            }
        </style>
    </head>
    <body>
        <h1>Sweet icons preview — Habits</h1>
        <p class="hint">
            Клікни «Copy SVG» щоб скопіювати чистий SVG, або «Copy icon.js
            entry» щоб скопіювати готовий рядок для вставки в
            <code>icons.js</code>.
        </p>

        <div class="grid" id="iconsGrid">
            <!-- Cards will be injected by script -->
        </div>

        <script>
            // Колекція іконок (той самий вміст як у sweet-icons.js, але тут в HTML)
            const SWEET_ICONS = [
                {
                    id: "donut-filled",
                    svg: `<svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">\n  <path fill="#F8BBD0" d="M12 4a8 8 0 100 16 8 8 0 000-16zm0 6a2 2 0 110 4 2 2 0 010-4z"/>\n  <path fill="#FFF" d="M6 9c1.5 1 3 1 6 1s4.5 0 6-1c-1 2-3 3-6 3s-5-1-6-3z"/>\n</svg>`,
                },
                {
                    id: "cupcake",
                    svg: `<svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">\n  <path fill="#FFECB3" d="M5 12c0 3 1.5 5 7 5s7-2 7-5H5z"/>\n  <path fill="#FFCDD2" d="M8 9a4 4 0 018 0c1 0 2 .5 2 1H6c0-.5 1-1 2-1z"/>\n  <circle cx="12" cy="6" r="1" fill="#D32F2F"/>\n</svg>`,
                },
                {
                    id: "candy",
                    svg: `<svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">\n  <path fill="#FFE082" d="M12 8c2 0 4 1.5 4 4s-2 4-4 4-4-1.5-4-4 2-4 4-4z"/>\n  <path fill="#FF8A65" d="M4 10c2 1.2 3 1.2 5 1.2S12 11 14 11s3 0 5-1.2c-2 2-5 2-7 2s-5 0-7-2z"/>\n</svg>`,
                },
                {
                    id: "donut-sprinkles",
                    svg: `<svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">\n  <circle cx="12" cy="12" r="8" fill="#FFD54F"/>\n  <circle cx="12" cy="12" r="3" fill="#FFF"/>\n  <g fill="#8E24AA">\n    <rect x="9" y="7" width="1" height="2"/>\n    <rect x="15" y="8" width="1" height="2"/>\n    <rect x="11" y="14" width="1" height="2"/>\n  </g>\n</svg>`,
                },
                {
                    id: "chocolate",
                    svg: `<svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">\n  <rect x="4" y="6" width="16" height="12" rx="1" fill="#6D4C41"/>\n  <g fill="#5D4037">\n    <rect x="5" y="7" width="3" height="4"/>\n    <rect x="9" y="7" width="3" height="4"/>\n    <rect x="13" y="7" width="3" height="4"/>\n    <rect x="17" y="7" width="2" height="4"/>\n  </g>\n</svg>`,
                },
                {
                    id: "lollipop",
                    svg: `<svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">\n  <circle cx="10" cy="8" r="4" fill="#F48FB1"/>\n  <rect x="11.5" y="11.5" width="1.5" height="6" fill="#BCAAA4"/>\n</svg>`,
                },
            ];

            function escapeForJsString(str) {
                return str
                    .replace(/\\/g, "\\\\")
                    .replace(/`/g, "\\`")
                    .replace(/\n/g, "\\n");
            }

            function copy(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    return navigator.clipboard.writeText(text);
                }
                const ta = document.createElement("textarea");
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                ta.remove();
                return Promise.resolve();
            }

            function createCard(icon) {
                const card = document.createElement("div");
                card.className = "card";

                const iconWrap = document.createElement("div");
                iconWrap.className = "icon";
                iconWrap.innerHTML = icon.svg;

                const label = document.createElement("div");
                label.className = "label";
                label.textContent = icon.id;

                const actions = document.createElement("div");
                actions.className = "actions";

                const btnCopySvg = document.createElement("button");
                btnCopySvg.textContent = "Copy SVG";
                btnCopySvg.onclick = () => {
                    copy(icon.svg)
                        .then(() => (btnCopySvg.textContent = "Copied!"))
                        .catch(() => alert("Copy failed"));
                    setTimeout(
                        () => (btnCopySvg.textContent = "Copy SVG"),
                        1200,
                    );
                };

                const btnCopyEntry = document.createElement("button");
                btnCopyEntry.className = "secondary";
                btnCopyEntry.textContent = "Copy icon.js entry";
                btnCopyEntry.onclick = () => {
                    const svgForJs = escapeForJsString(icon.svg);
                    const entry = `{ id: '${icon.id}', svg: '${svgForJs}' }`;
                    copy(entry)
                        .then(() => (btnCopyEntry.textContent = "Copied!"))
                        .catch(() => alert("Copy failed"));
                    setTimeout(
                        () => (btnCopyEntry.textContent = "Copy icon.js entry"),
                        1200,
                    );
                };

                const pre = document.createElement("pre");
                pre.textContent = icon.svg;

                actions.appendChild(btnCopySvg);
                actions.appendChild(btnCopyEntry);

                card.appendChild(iconWrap);
                card.appendChild(label);
                card.appendChild(actions);
                card.appendChild(pre);

                return card;
            }

            const grid = document.getElementById("iconsGrid");
            SWEET_ICONS.forEach((icon) => grid.appendChild(createCard(icon)));
        </script>
    </body>
</html>
