<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Google Drive Data</title>
</head>
<body>
  <h1>Дані з Google Drive</h1>
  <pre id="output">Завантаження...</pre>

  <script>
    const fileUrl = "https://drive.google.com/uc?export=download&id=1B_xoTwR5w_ppx6eGsyn6uDlsYK4Y6b9m";

    async function loadFile() {
      try {
        const response = await fetch(fileUrl);
        const text = await response.text();
        document.getElementById("output").textContent = text;
      } catch (err) {
        document.getElementById("output").textContent =
          "Помилка завантаження: " + err;
      }
    }

    loadFile();
  </script>
</body>
</html>
