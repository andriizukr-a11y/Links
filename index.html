<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Посилання</title>
  <link rel="icon" href="data/favicon.png" type="image/png">

  <link rel="preload" href="data/favicons/default.png" as="image">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="preloader"><div class="spinner"></div></div>

  <button id="toggle-tasks-btn" class="toggle-tasks-btn" title="Показати/приховати завдання">⚙️</button>

  <div class="main-container">
    <div class="tabs" id="tabs-container"></div>

    <div class="content-wrapper">
      <div class="content-section">
        <div id="contents-container"></div>
      </div>

      <div class="tasks-section">
        <h2 class="tasks-title">Завдання</h2>
        <div class="tasks-input-wrapper">
          <input type="text" id="task-input" class="task-input" placeholder="Додати завдання...">
          <button id="add-task-btn" class="add-task-btn">+</button>
        </div>
        <ul id="tasks-list" class="tasks-list"></ul>

        <h2 class="notes-title">Нотатки</h2>
        <textarea id="notes-textarea" class="notes-textarea" placeholder="Ваші нотатки..."></textarea>
      </div>
    </div>
  </div>

  <script defer src="bookmarks.js"></script>
  <script defer src="app.js"></script>
  <script defer src="main.js"></script>
  <script defer src="tasks.js"></script>

</body>
</html>
